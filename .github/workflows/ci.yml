name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Check CLI
        run: |
          python -m sona --version
          python -m sona --help

      - name: Run local hello file
        run: |
          python -c 'from pathlib import Path; Path("hello.sona").write_text("print(\"Hello, Sona!\")\n", encoding="utf-8")'
          python -m sona hello.sona

      - name: Run official examples
        run: python tools/run_examples.py
